<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <circle cx="64" cy="64" r="58" fill="#ffffff" stroke="#1a1a1a" stroke-width="6"/>
  <!-- Hour ticks -->
  <line x1="64" y1="12" x2="64" y2="22" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="106" x2="64" y2="116" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="12" y1="64" x2="22" y2="64" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="106" y1="64" x2="116" y2="64" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <!-- Hour hand (10 o'clock) -->
  <line x1="64" y1="64" x2="44" y2="34" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand (2 o'clock) -->
  <line x1="64" y1="64" x2="88" y2="38" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="4" fill="#1a1a1a"/>
</svg>
